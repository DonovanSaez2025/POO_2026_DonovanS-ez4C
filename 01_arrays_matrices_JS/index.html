<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Autor de la página -->
    <meta name="author" content="donovansaez@liceovvh.cl">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="static/css/style.css">
    <!-- Título de la página -->
    <title>Arrays y matrices</title>
</head>

<body>
    <header>
        <h1>Arrays y Matrices</h1>
    </header>

    <main class="contenedor">
        <div class="tarjeta">
            <h2>Ejercicio 1: </h2>
            <span>El Mensaje Desordenado (Push y Pop)</span>
            <button class="tarjetaboton" onclick="construirFrase()">Ejecutar</button>
        </div>

        <div class="tarjeta">
            <h2>Ejercicio 2: </h2>
            <span>Gestión de Fila de Espera (Shift y Unshift)</span>
            <button class="tarjetaboton" onclick="filaEspera()">Ejecutar</button>
        </div>

        <div class="tarjeta">
            <h2>Ejercicio 3: </h2>
            <span>Reordenando Números (Lógica de Índices)</span>
            <button class="tarjetaboton" onclick="reordenaNumeros()">Ejecutar</button>
        </div>

        <div class="tarjeta">
            <h2>Ejercicio 4: </h2>
            <span>Coordenadas en la Matriz (Suma Simple)</span>
            <button class="tarjetaboton" onclick="coordenadaMatriz()">Ejecutar</button>
        </div>

        <div class="tarjeta">
            <h2>Ejercicio 5: </h2>
            <span>El Intruso en la Tercera Dimensión</span>
            <button class="tarjetaboton" onclick="intrusoDimension()">Ejecutar</button>
        </div>
    </main>
    <!-- Vínculo con JS -->
    <script src="static/js/script.js"></script>
</body>

</html>
